<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funny Life Story Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Funny Life Story Generator</h1>

    <form id="funnyForm">
        <input type="text" id="name" placeholder="your name" required><br>
        <input type="text" id="food" placeholder="your FavouriteFood" required><br>
        <input type="text" id="hobby" placeholder="your hobby" required><br>
        <input type="text" id="career" placeholder="your dream career" required><br><br>
        <button type="submit" >Generate Story</button> 
    </form>
    <div id="output"></div>
  

    <script src="index.js"></script>
</body>
</html>
